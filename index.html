<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a0d1f" />
  <title>魔王のダイスカジノ</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23271333'/%3E%3Crect x='18' y='18' width='64' height='64' rx='12' fill='%23f3cd6b'/%3E%3Ccircle cx='37' cy='37' r='7' fill='%23c01f3c'/%3E%3Ccircle cx='63' cy='37' r='7' fill='%23c01f3c'/%3E%3Ccircle cx='37' cy='63' r='7' fill='%23c01f3c'/%3E%3Ccircle cx='63' cy='63' r='7' fill='%23c01f3c'/%3E%3Ccircle cx='50' cy='50' r='7' fill='%23c01f3c'/%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23271333'/%3E%3Crect x='18' y='18' width='64' height='64' rx='12' fill='%23f3cd6b'/%3E%3Ccircle cx='50' cy='50' r='7' fill='%23c01f3c'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Noto+Serif+JP:wght@600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=3d4" />
</head>
<body>
  <!-- アプリ枠（モバイルファースト・PCでは中央寄せ） -->
  <div id="app" class="app">
    <!-- 上部バー（全画面共通） -->
    <header class="topbar" id="topbar">
      <div class="topbar__wallet">
        <button class="chip chip--coin" id="chipCoin" type="button" aria-label="コイン残高">
          <span class="chip__icon">🪙</span><span class="chip__val" id="coinVal">0</span>
        </button>
        <button class="chip chip--heart" id="chipHeart" type="button" aria-label="ハート残高">
          <span class="chip__icon">❤️</span><span class="chip__val" id="heartVal">0</span>
        </button>
      </div>
      <button class="topbar__menu" id="btnMenu" type="button" aria-label="メニュー">☰</button>
    </header>

    <!-- 画面差し替えエリア -->
    <main class="screen" id="screen" aria-live="polite"></main>

    <!-- 下部ナビ（全画面共通） -->
    <nav class="bottomnav" id="bottomnav">
      <button class="navbtn" data-nav="home" type="button">
        <span class="navbtn__icon">🏠</span><span class="navbtn__label">ホーム</span>
      </button>
      <button class="navbtn" data-nav="mission" type="button">
        <span class="navbtn__icon">🎯</span><span class="navbtn__label">ミッション</span>
      </button>
      <button class="navbtn" data-nav="shop" type="button">
        <span class="navbtn__icon">🛒</span><span class="navbtn__label">ショップ</span>
      </button>
      <button class="navbtn" data-nav="ranking" type="button">
        <span class="navbtn__icon">👑</span><span class="navbtn__label">ランキング</span>
      </button>
      <button class="navbtn" data-nav="menu" type="button">
        <span class="navbtn__icon">≡</span><span class="navbtn__label">メニュー</span>
      </button>
    </nav>

    <!-- トースト -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="js/store.js?v=3d4"></script>
  <script src="js/fx.js?v=3d4"></script>
  <script src="js/bgm.js?v=3d4"></script>
  <script src="js/dice3d.js?v=3d4"></script>
  <script src="js/ui.js?v=3d4"></script>
  <script src="js/games/bj.js?v=3d4"></script>
  <script src="js/games/prospi.js?v=3d4"></script>
  <script src="js/games/slot.js?v=3d4"></script>
  <script src="js/router.js?v=3d4"></script>
  <script src="js/main.js?v=3d4"></script>
</body>
</html>
